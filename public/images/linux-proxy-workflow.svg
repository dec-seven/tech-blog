<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">mihomo 配置流程</title>
  <desc id="desc">安装、准备配置、前台测试、systemd 后台运行、按需启用代理。</desc>
  <rect width="1100" height="560" rx="28" fill="#f7f5ef"/>
  <rect x="42" y="42" width="1016" height="476" rx="20" fill="#ffffff" stroke="#dcd8ca"/>
  <text x="80" y="98" fill="#20231f" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800">mihomo 配置流程</text>
  <text x="80" y="134" fill="#687064" font-family="Inter, system-ui, sans-serif" font-size="18">先前台验证，再交给 systemd 常驻；日常命令通过函数按需开启代理。</text>

  <g font-family="Inter, system-ui, sans-serif">
    <g>
      <circle cx="139" cy="267" r="43" fill="#dcebe5" stroke="#93b7aa"/>
      <text x="126" y="276" fill="#0d493f" font-size="26" font-weight="800">1</text>
      <text x="91" y="350" fill="#20231f" font-size="21" font-weight="800">安装二进制</text>
      <text x="82" y="380" fill="#687064" font-size="15">放到 /usr/local/bin</text>
    </g>
    <g>
      <circle cx="345" cy="267" r="43" fill="#dcebe5" stroke="#93b7aa"/>
      <text x="331" y="276" fill="#0d493f" font-size="26" font-weight="800">2</text>
      <text x="298" y="350" fill="#20231f" font-size="21" font-weight="800">准备配置</text>
      <text x="275" y="380" fill="#687064" font-size="15">/etc/mihomo/config.yaml</text>
    </g>
    <g>
      <circle cx="551" cy="267" r="43" fill="#dcebe5" stroke="#93b7aa"/>
      <text x="537" y="276" fill="#0d493f" font-size="26" font-weight="800">3</text>
      <text x="504" y="350" fill="#20231f" font-size="21" font-weight="800">前台测试</text>
      <text x="499" y="380" fill="#687064" font-size="15">curl --proxy 验证</text>
    </g>
    <g>
      <circle cx="757" cy="267" r="43" fill="#dcebe5" stroke="#93b7aa"/>
      <text x="743" y="276" fill="#0d493f" font-size="26" font-weight="800">4</text>
      <text x="714" y="350" fill="#20231f" font-size="21" font-weight="800">后台常驻</text>
      <text x="699" y="380" fill="#687064" font-size="15">systemctl enable --now</text>
    </g>
    <g>
      <circle cx="963" cy="267" r="43" fill="#20231f" stroke="#20231f"/>
      <text x="949" y="276" fill="#f7f5ef" font-size="26" font-weight="800">5</text>
      <text x="920" y="350" fill="#20231f" font-size="21" font-weight="800">按需使用</text>
      <text x="910" y="380" fill="#687064" font-size="15">proxy_on / proxy_off</text>
    </g>
  </g>

  <g fill="none" stroke="#146b5c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M190 267h101"/>
    <path d="m281 255 12 12-12 12"/>
    <path d="M396 267h101"/>
    <path d="m487 255 12 12-12 12"/>
    <path d="M602 267h101"/>
    <path d="m693 255 12 12-12 12"/>
    <path d="M808 267h101"/>
    <path d="m899 255 12 12-12 12"/>
  </g>

  <rect x="80" y="440" width="940" height="44" rx="10" fill="#f1eee6" stroke="#dcd8ca"/>
  <text x="104" y="468" fill="#20231f" font-family="SFMono-Regular, Consolas, monospace" font-size="17">sudo systemctl status mihomo  →  proxy_on  →  curl https://github.com</text>
</svg>
